# Server Configuration
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/campus_delivery_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_secure_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configurations (Secret must be at least 256-bit / 32 characters long)
campusdelivery.jwt.secret=9a6767664c312781492b4532724c522f3d64387a2a6b252f4c3d31703274332a67
campusdelivery.jwt.expirationMs=86400000

# Logging Configurations
logging.level.org.springframework.security=INFO
logging.level.com.campusdelivery=DEBUG
